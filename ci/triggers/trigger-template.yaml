apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerTemplate
metadata:
  name: platformup2date-pr
spec:
  params:
    - name: ref
      description: The Git commit revision
    - name: sha
      description: The Git commit sha
    - name: branch_name
      description: Sanitized branch name for use in resource names and prerelease label
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: platformup2date--pr--$(tt.params.branch_name)--
      spec:
        pipelineRef:
          name: pr-build-test
        taskRunTemplate:
          serviceAccountName: tekton-pipeline-platformup2date
          podTemplate:
            securityContext:
              fsGroup: 1000
        params:
          - name: url
            value: git@git.sreyardship.com:SREYardship/PlatformUp2Date.git
          - name: revision
            value: $(tt.params.ref)
          - name: sha
            value: $(tt.params.sha)
          - name: branch_name
            value: $(tt.params.branch_name)
        workspaces:
          - name: ssh-directory
            secret:
              secretName: git-creds
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteMany
                storageClassName: ceph-filesystem
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerBinding
metadata:
  name: platformup2date-pr-binding
spec:
  params:
    - name: ref
      value: $(body.pull_request.head.ref)
    - name: sha
      value: $(body.pull_request.head.sha)
    - name: branch_name
      value: $(extensions.branch_name)
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerTemplate
metadata:
  name: platformup2date-main
spec:
  params:
    - name: sha
      description: The Git commit sha of the merged PR head
    - name: branch_name
      description: Sanitized branch name of the merged PR
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: platformup2date--main--
      spec:
        pipelineRef:
          name: main-release
        taskRunTemplate:
          serviceAccountName: tekton-pipeline-platformup2date
          podTemplate:
            securityContext:
              fsGroup: 1000
        params:
          - name: url
            value: git@git.sreyardship.com:SREYardship/PlatformUp2Date.git
          - name: revision
            value: main
          - name: sha
            value: $(tt.params.sha)
          - name: branch_name
            value: $(tt.params.branch_name)
        workspaces:
          - name: ssh-directory
            secret:
              secretName: git-creds
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteMany
                storageClassName: ceph-filesystem
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerBinding
metadata:
  name: platformup2date-main-binding
spec:
  params:
    - name: sha
      value: $(body.pull_request.head.sha)
    - name: branch_name
      value: $(extensions.branch_name)
