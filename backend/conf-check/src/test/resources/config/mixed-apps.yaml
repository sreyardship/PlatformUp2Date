# Fixture for YamlAppConfigReaderTests / ConfigCommandWiringTests (issue 06).
#
# Mirrors docs/samples/platform-config.yaml's top-level shape (platform-config: apps: [...]) plus a
# calver + http-regex app (mirroring the commented OpenWRT example in
# backend/src/main/resources/application.yml, simplified to a plain "http" current instead of
# "ssh-os-release" since AppConfig/the config gate does not model ssh at all), plus an app whose
# current/latest kinds have no CLI-transparent validator at all (github-release / ssh-os-release) so
# it exercises "nothing applicable to check".
platform-config:
  apps:
    - name: chaos-social
      # version-scheme omitted deliberately: exercises the SEMVER default.
      changelog-url: https://github.com/mastodon/mastodon/releases/tag/v{version}
      current:
        type: http
        url: https://chaos.social/api/v1/instance
        version-key: /version
      latest:
        type: http-regex
        url: https://example.test/releases
        regex: 'v(\d+\.\d+\.\d+)'

    - name: openwrt-router
      version-scheme: calver
      calver-format: "YY.0M.MICRO"
      changelog-url: https://openwrt.org/releases/{YY}.{0M}/notes-{version}
      current:
        # Simplified from the real ssh-os-release shape: AppConfig/the config gate has no
        # CLI-transparent validator for ssh-os-release, so this fixture uses a plain http current
        # instead, purely to exercise calver-format + http-regex together.
        type: http
        url: https://downloads.example.test/current-version.json
        # version-key deliberately omitted: exercises the "absent, not defaulted by the reader"
        # design note on AppConfig#currentVersionKey().
      latest:
        type: http-regex
        url: https://downloads.openwrt.org/releases/
        regex: 'href="(\d+\.\d+(?:\.\d+)?)/"'

    - name: gitea-oci
      # No changelog-url, no calver-format: nothing for the changelog/calver surfaces to check.
      current:
        # ssh-os-release has no CLI-transparent current validator: the pointer surface is
        # not applicable regardless of version-key.
        type: ssh-os-release
      latest:
        # github-release has no CLI-transparent latest validator: the regex surface is not
        # applicable regardless of regex.
        type: github-release
        repo: gitea/gitea
