mp.openapi.extensions.smallrye.info.title=PlatformUp2Date
mp.openapi.extensions.smallrye.info.version=1.0.0-SNAPSHOT

# Emit Instant as ISO-8601 string (e.g. "2026-07-01T10:00:00Z") so the client can
# parse readAt without epoch-millis gymnastics.
quarkus.jackson.write-dates-as-timestamps=false

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,PUT,POST,DELETE
quarkus.http.cors.headers=X-Custom
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

