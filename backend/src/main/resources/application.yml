quarkus:
  mcp:
    server:
      server-info:
        name: platformup2date
      # Relocate the MCP endpoint from the default /mcp to /api/mcp so the whole
      # backend surface lives under one prefix. The cluster HTTPRoute forwards
      # /api -> backend (unstripped) and / -> frontend; at the default /mcp the
      # MCP endpoint falls through to the frontend and is unreachable. See docs/adr/0002.
      #
      # Run the Streamable HTTP transport STATELESS: streamable.auto-init makes each
      # request auto-initialise its own throwaway MCP session, so no session state is
      # pinned to a replica. That lets any replica serve any request behind round-robin
      # load balancing with no mesh/session affinity — the requirement that motivated
      # dropping the session-stateful SSE transport. See docs/adr/0004.
      #
      # Applies to all profiles (prod included) on purpose.
      http:
        root-path: api/mcp
        streamable:
          auto-init: true

# platform-config (the apps to monitor + scrape interval) is environment-specific.
#
# In production it is supplied exclusively by a mounted ConfigMap, pointed to via
# QUARKUS_CONFIG_LOCATIONS=/config/platform-config.yaml — see
# apps/service-spaces/platformup2date/app/ in the jumziCluster repo. Nothing is
# baked into the default (prod) profile on purpose, so changing the watched apps
# is a ConfigMap edit, not an image rebuild.
#
# The values below apply to local dev only (`gradle quarkusDev`). Tests supply
# their own minimal config in src/test/resources/application.properties.
"%dev":
  quarkus:
    # Local-dev Valkey. Override with QUARKUS_REDIS_HOSTS to point at a running
    # instance; otherwise Dev Services starts a throwaway container.
    redis:
      hosts: redis://localhost:6379
  platform-config:
    scrape-interval: 1h
    # Optional GitHub token for the scrape's `latest` leg. Resolved from the environment via
    # SmallRye expansion: an unset GITHUB_TOKEN yields an empty/absent token (no startup error),
    # preserving today's unauthenticated behaviour.
    github:
      token: ${GITHUB_TOKEN:}
    # Manual-scrape rolling-window budget (Refresh button / MCP trigger). Defaults are 10/1h;
    # these dev values keep the same shape explicit.
    scrape-trigger:
      max-per-window: 10
      window: 1h
    # Targeted-scrape rolling-window budget (agent-driven single-app/side updates, issue 03) — kept
    # separate and larger than scrape-trigger so agent-driven work cannot starve the UI's Refresh budget.
    targeted-scrape-trigger:
      max-per-window: 30
      window: 1h
    apps:
      - name: argo-cd
        current:
          type: http
          url: https://deployments.sreyardship.com/api/version
        latest:
          type: github-release
          repo: argoproj/argo-cd
      - name: git-tea
        current:
          type: http
          url: https://git.sreyardship.com/api/v1/version
        latest:
          type: github-release
          repo: go-gitea/gitea
      - name: sharry
        current:
          type: http
          url: https://fileshare.sreyardship.com/api/v2/open/info/version
        latest:
          type: github-release
          repo: eikek/sharry
      - name: harbor
        current:
          type: http
          url: https://container-registry.sreyardship.com/api/v2.0/systeminfo
          version-key: /harbor_version
          strip-prerelease: true
          # Harbor 2.13+ only returns 'harbor_version' from /systeminfo to an authenticated
          # caller — see docs/adr/0008. Resolved from the environment via SmallRye expansion;
          # an unset HARBOR_USER/HARBOR_PASS resolves to "" (not absent), which the http
          # current source's factory treats as a value problem (FailedCurrentSource), not a
          # boot failure.
          auth:
            type: basic
            username: ${HARBOR_USER:}
            password: ${HARBOR_PASS:}
        latest:
          type: github-release
          repo: goharbor/harbor
      # --- k8s API server (current-only) example — DO NOT enable under %dev ---
      #
      # This block is intentionally commented out. It documents the shape an operator
      # copies into the PRODUCTION ConfigMap (apps/service-spaces/platformup2date/app/
      # in the jumziCluster repo) — NOT a live dev app. Local dev has no serviceaccount
      # mount, so the ca-cert and token-file below would be absent and every scrape of
      # this app would produce a FailedCurrentSource; keeping it commented protects
      # `gradle quarkusDev` boot and the dev scrape loop. Enable it only in-cluster,
      # where the serviceaccount files are mounted.
      #
      # Reproduces the canonical in-cluster probe:
      #   curl --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
      #        -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
      #        https://kubernetes.default.svc/version
      #
      # - token-file: the serviceaccount token rotates (the kubelet refreshes the file
      #   in place), so the bearer credential is read from the file PER REQUEST rather
      #   than captured once at boot — a long-lived process must never cache it.
      # - ca-cert: the cluster API is served by a PRIVATE cluster CA the JVM does not
      #   trust by default. The custom CA REPLACES (does not augment) the default
      #   truststore and is scoped to THIS scraper only, so it cannot widen trust for
      #   any other current source.
      # - version-key: GET /version returns {"major":"1","minor":"29","gitVersion":"v1.29.x",...};
      #   /gitVersion is the human-readable semver-shaped field.
      #   NOTE: confirm the EXACT pointer against the real cluster API when rolling to
      #   dev — orchestrator to record the verified pointer here after manual dev check.
      #
      # - name: kubernetes
      #   current:
      #     type: http
      #     url: https://kubernetes.default.svc/version
      #     version-key: /gitVersion
      #     ca-cert: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      #     auth:
      #       type: bearer
      #       token-file: /var/run/secrets/kubernetes.io/serviceaccount/token
