quarkus:
  mcp:
    server:
      server-info:
        name: platformup2date
      # Relocate the MCP endpoint from the default /mcp to /api/mcp so the whole
      # backend surface lives under one prefix. The cluster HTTPRoute forwards
      # /api -> backend (unstripped) and / -> frontend; at the default /mcp the
      # MCP endpoint falls through to the frontend and is unreachable. See docs/adr/0002.
      #
      # Run the Streamable HTTP transport STATELESS: streamable.auto-init makes each
      # request auto-initialise its own throwaway MCP session, so no session state is
      # pinned to a replica. That lets any replica serve any request behind round-robin
      # load balancing with no mesh/session affinity — the requirement that motivated
      # dropping the session-stateful SSE transport. See docs/adr/0004.
      #
      # Applies to all profiles (prod included) on purpose.
      http:
        root-path: api/mcp
        streamable:
          auto-init: true

# platform-config (the apps to monitor + scrape interval) is environment-specific.
#
# In production it is supplied exclusively by a mounted ConfigMap, pointed to via
# QUARKUS_CONFIG_LOCATIONS=/config/platform-config.yaml — see
# apps/service-spaces/platformup2date/app/ in the jumziCluster repo. Nothing is
# baked into the default (prod) profile on purpose, so changing the watched apps
# is a ConfigMap edit, not an image rebuild.
#
# The values below apply to local dev only (`gradle quarkusDev`). Tests supply
# their own minimal config in src/test/resources/application.properties.
"%dev":
  quarkus:
    # Local-dev Valkey. Override with QUARKUS_REDIS_HOSTS to point at a running
    # instance; otherwise Dev Services starts a throwaway container.
    redis:
      hosts: redis://localhost:6379
  platform-config:
    scrape-interval: 1h
    # Manual-scrape rolling-window budget (Refresh button / MCP trigger). Defaults are 10/1h;
    # these dev values keep the same shape explicit.
    scrape-trigger:
      max-per-window: 10
      window: 1h
    apps:
      - name: argo-cd
        current: https://deployments.sreyardship.com/api/version
        latest: https://api.github.com/repos/argoproj/argo-cd/releases/latest
      - name: git-tea
        current: https://git.sreyardship.com/api/v1/version
        latest: https://api.github.com/repos/go-gitea/gitea/releases/latest
      - name: sharry
        current: https://fileshare.sreyardship.com/api/v2/open/info/version
        latest: https://api.github.com/repos/eikek/sharry/releases/latest
