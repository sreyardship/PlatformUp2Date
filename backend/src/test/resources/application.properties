quarkus.scheduler.enabled=false
platform-config.scrape-interval=1h
# Minimal entry so the platform-config @ConfigMapping resolves when @QuarkusTest
# boots the app. The repository is mocked, so these values are never fetched.
platform-config.apps[0].name=test-app
platform-config.apps[0].current.type=http
platform-config.apps[0].current.url=https://example.test/version
platform-config.apps[0].latest.type=github-release
platform-config.apps[0].latest.url=https://example.test/latest
# Second app: calver coverage for ValkeyScrapeStateStoreIT (issue 02). Same shape as apps[0] —
# the repository/sources are mocked in these tests, so the URLs are never actually fetched.
platform-config.apps[1].name=test-calver-app
platform-config.apps[1].version-scheme=calver
platform-config.apps[1].calver-format=YYYY.MM.MICRO
platform-config.apps[1].current.type=http
platform-config.apps[1].current.url=https://example.test/calver-version
platform-config.apps[1].latest.type=github-release
platform-config.apps[1].latest.url=https://example.test/calver-latest
