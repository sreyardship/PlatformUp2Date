quarkus.scheduler.enabled=false
platform-config.scrape-interval=1h
# Minimal entry so the platform-config @ConfigMapping resolves when @QuarkusTest
# boots the app. The repository is mocked, so these values are never fetched.
platform-config.apps[0].name=test-app
platform-config.apps[0].current.type=http
platform-config.apps[0].current.url=https://example.test/version
platform-config.apps[0].latest.type=github-release
platform-config.apps[0].latest.url=https://example.test/latest
