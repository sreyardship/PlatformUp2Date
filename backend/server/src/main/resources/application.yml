quarkus:
  native:
    # A few MINA SSHD areas must initialise at image RUN time, not build time:
    #  - org.apache.sshd.common.random: JceRandom$Cache's initializer creates a global SecureRandom,
    #    which GraalVM forbids in the image heap (cached seed). Package scope covers the nested $Cache.
    #  - Ed25519PublicKeyDecoder: its static initializer references the i2p-eddsa backend we do not
    #    bundle (ed25519 flows through the JDK/BouncyCastle providers instead).
    # Scoped narrowly (not the whole org.apache.sshd package) so build-time-instantiated singletons
    # like RootedFileSystemProvider keep their default init and do not conflict. See docs/adr/0018.
    additional-build-args:
      - --initialize-at-run-time=org.apache.sshd.common.random
      - --initialize-at-run-time=org.apache.sshd.common.util.security.eddsa.Ed25519PublicKeyDecoder
      # MINA SSHD resolves key/signature entities through the named BouncyCastle provider
      # (getInstance(algorithm, "BC")). GraalVM requires JCA providers to be registered AND verified
      # at build time, so register BouncyCastle here; BouncyCastleProviderInstaller then ensures it is
      # in the runtime provider list by name. Without this the native scrape fails with
      # "no such provider: BC" / "provider ... not registered at build time". See docs/adr/0018.
      - -H:AdditionalSecurityProviders=org.bouncycastle.jce.provider.BouncyCastleProvider
  # Only takes effect when quarkus.container-image.build=true is passed on the CLI (the `native`
  # PR job's quarkusIntTest run). Points at the one Dockerfile that actually ships
  # (Dockerfile.native-ci, see build-images.yml) instead of letting quarkus-container-image-docker
  # generate its own, so the native ITs boot the exact image that gets deployed.
  docker:
    dockerfile-native-path: src/main/docker/Dockerfile.native-ci
  mcp:
    server:
      server-info:
        name: platformup2date
      # Relocate the MCP endpoint from the default /mcp to /api/mcp so the whole
      # backend surface lives under one prefix. The cluster HTTPRoute forwards
      # /api -> backend (unstripped) and / -> frontend; at the default /mcp the
      # MCP endpoint falls through to the frontend and is unreachable. See docs/adr/0002.
      #
      # Run the Streamable HTTP transport STATELESS: streamable.auto-init makes each
      # request auto-initialise its own throwaway MCP session, so no session state is
      # pinned to a replica. That lets any replica serve any request behind round-robin
      # load balancing with no mesh/session affinity — the requirement that motivated
      # dropping the session-stateful SSE transport. See docs/adr/0004.
      #
      # Applies to all profiles (prod included) on purpose.
      http:
        root-path: api/mcp
        streamable:
          auto-init: true

  # Shared-issuer, role-gated surface authentication (docs/adr/0026, docs/adr/0028, issues 01+02):
  # presence-switched on OIDC_ISSUER/OIDC_AUDIENCE, plus a per-surface role var — MCP_OIDC_ROLE
  # (conventionally pu2d-mcp) gates /api/mcp*, WEB_OIDC_ROLE (conventionally pu2d-web) gates
  # /api/v1* — each surface gated INDEPENDENTLY of the other and of the tenant switch alone: a
  # surface is only protected when its OWN role var is set. These are the whole operator-visible
  # surface. The derived internal properties below (tenant-enabled, auth-server-url, token
  # audience, and each surface's HTTP permission policy) are produced at runtime by
  # SurfaceAuthConfigSourceFactory from those env vars — NOT by a static ${OIDC_ISSUER:} expansion
  # here, because the auth-on test profile derives OIDC_ISSUER FROM quarkus.oidc.auth-server-url
  # (Keycloak Dev Services' dynamic URL); a static reverse expansion here would create a circular
  # property reference. When OIDC_ISSUER is absent/blank, tenant-enabled resolves to false and the
  # OIDC extension stays fully inert; each surface's policy below resolves to permit, preserving
  # today's open endpoints. See SurfaceAuthMode for the matching boot-time validation/log line and
  # SurfaceAuthConfigurationException for the illegal issuer-without-audience and
  # role-without-issuer states.
  #
  # Keycloak Dev Services would otherwise auto-start for ANY test once quarkus-oidc is on the
  # classpath (the extension's zero-config dev/test convenience); disabled by default so the
  # auth-off regression suite (ApplicationMcpServerIT) stays fast and Docker-free, and re-enabled
  # explicitly by the auth-on @TestProfile (SurfaceAuthTestProfile).
  oidc:
    # RFC 9728 protected-resource metadata (docs/adr/0026, issue 02). Safe to enable
    # unconditionally here (no presence-derivation needed for this property): the extension only
    # registers the well-known route and appends the WWW-Authenticate `resource_metadata` pointer
    # for tenants whose tenant-enabled is true, and tenant-enabled is the very flag
    # SurfaceAuthConfigSourceFactory derives from OIDC_ISSUER/OIDC_AUDIENCE above. So
    # with both env vars unset, tenant-enabled resolves to false, the metadata route never
    # registers, and the well-known path 404s exactly as before this issue. The explicit `resource`
    # value is what makes both the well-known route path and the metadata document's `resource`
    # field name /api/mcp — matching the exact path ADR 0026 documents,
    # /.well-known/oauth-protected-resource/api/mcp — instead of the bare host-root default.
    resource-metadata:
      enabled: true
      resource: /api/mcp
  keycloak:
    devservices:
      enabled: false
  http:
    auth:
      # docs/adr/0026 issue 03: Quarkus's default (proactive: true) runs authentication against
      # ANY request that carries credentials the enabled OIDC tenant recognises the shape of
      # (an Authorization: Bearer header), on EVERY path — not just the ones with an authenticated
      # permission policy. With the /api/mcp* tenant enabled, a stale/foreign/garbage bearer token
      # attached to a permit-all request (e.g. a browser extension's leftover header, or a
      # misconfigured client hitting /api/v1 or /q/health) would fail proactive auth and 401 a
      # surface this feature was never meant to touch. Lazy auth defers authentication until a
      # security constraint actually requires it, so permit-all paths ignore credential presence
      # entirely while /api/mcp*'s derived `mcp-role` role policy below still triggers and enforces
      # (and its 401 challenge/WWW-Authenticate response, pinned by McpOidcDiscoveryIT, is
      # unaffected — that challenge comes from the failed authorization check on the protected
      # path, not from proactive authentication). This is a Quarkus BUILD_TIME property, so it
      # cannot be presence-derived at runtime the way tenant-enabled is; that is harmless here
      # because with auth off the OIDC tenant itself is disabled and proactive-vs-lazy has nothing
      # to act on. Applies unconditionally (auth-on and auth-off alike).
      proactive: false
      permission:
        mcp:
          paths: /api/mcp*
          # policy is derived (a named "mcp-role" role policy | permit) by
          # SurfaceAuthConfigSourceFactory above; when enabled it also produces
          # quarkus.http.auth.policy.mcp-role.roles-allowed=<the raw MCP_OIDC_ROLE>.
        web:
          # The REST API surface (issue 02, docs/adr/0028): VersionController/ScrapeController
          # under /api/v1. Deliberately does NOT catch /q/health, /metrics or the OpenAPI/Swagger
          # routes — none of those live under /api/v1, so they stay permit-all regardless of this
          # surface's gate state (pinned by McpOidcNonMcpSurfacesIT/CrossSurfaceIsolationIT/
          # WebOnlyOpenMcpSurfaceIT's health+metrics-open assertions).
          paths: /api/v1*
          # policy is derived (a named "web-role" role policy | permit) by
          # SurfaceAuthConfigSourceFactory above, independently of the mcp policy above; when
          # enabled it also produces quarkus.http.auth.policy.web-role.roles-allowed=<the raw
          # WEB_OIDC_ROLE>. Gated only when WEB_OIDC_ROLE is itself raw-present — never merely
          # because the tenant (OIDC_ISSUER/OIDC_AUDIENCE) or the mcp role is on.

# platform-config (the apps to monitor + scrape interval) is environment-specific.
#
# In production it is supplied exclusively by a mounted ConfigMap, pointed to via
# QUARKUS_CONFIG_LOCATIONS=/config/platform-config.yaml — see
# apps/service-spaces/platformup2date/app/ in the jumziCluster repo. Nothing is
# baked into the default (prod) profile on purpose, so changing the watched apps
# is a ConfigMap edit, not an image rebuild.
#
# The values below apply to local dev only (`gradle quarkusDev`). Tests supply
# their own minimal config in src/test/resources/application.properties.
"%dev":
  quarkus:
    # Local-dev Valkey. Override with QUARKUS_REDIS_HOSTS to point at a running
    # instance; otherwise Dev Services starts a throwaway container.
    redis:
      hosts: redis://localhost:6379
    # Dev-only CORS (issue 03, docs/adr/0028): the Vite dev server serves the SPA from
    # localhost:3000 while Quarkus serves the API from localhost:8080 — a cross-origin request
    # in dev only. Production is same-origin behind /api (no CORS needed there), so this whole
    # block is scoped to %dev and MUST NOT be duplicated outside it. `origins` is pinned to the
    # exact dev origin (never "*") so an arbitrary origin cannot be granted access; `headers`
    # allows `authorization` (the SPA's bearer token) and `content-type`.
    http:
      cors:
        enabled: true
        origins: http://localhost:3000
        headers: authorization,content-type
        methods: GET,POST,OPTIONS
  platform-config:
    scrape-interval: 1h
    scrape-concurrency: 15
    # Optional GitHub token for the scrape's `latest` leg. Resolved from the environment via
    # SmallRye expansion: an unset GITHUB_TOKEN yields an empty/absent token (no startup error),
    # preserving today's unauthenticated behaviour.
    github:
      token: ${GITHUB_TOKEN:}
    # Manual-scrape rolling-window budget (Refresh button / MCP trigger). Defaults are 10/1h;
    # these dev values keep the same shape explicit.
    scrape-trigger:
      max-per-window: 10
      window: 1h
    # Targeted-scrape rolling-window budget (agent-driven single-app/side updates, issue 03) — kept
    # separate and larger than scrape-trigger so agent-driven work cannot starve the UI's Refresh budget.
    targeted-scrape-trigger:
      max-per-window: 30
      window: 1h
    apps:
      - name: argo-cd
        # Changelog link (ADR-0021): a semver app-level template, sibling of version-scheme.
        # github-release gets no automatic default — the 'v' tag prefix is a static literal here.
        changelog-url: https://github.com/argoproj/argo-cd/releases/tag/v{version}
        current:
          type: http
          url: https://deployments.sreyardship.com/api/version
        latest:
          type: github-release
          repo: argoproj/argo-cd
      - name: git-tea
        changelog-url: https://github.com/go-gitea/gitea/releases/tag/v{version}
        current:
          type: http
          url: https://git.sreyardship.com/api/v1/version
        latest:
          type: github-release
          repo: go-gitea/gitea
      - name: sharry
        changelog-url: https://github.com/eikek/sharry/releases/tag/v{version}
        current:
          type: http
          url: https://fileshare.sreyardship.com/api/v2/open/info/version
        latest:
          type: github-release
          repo: eikek/sharry
      - name: harbor
        changelog-url: https://github.com/goharbor/harbor/releases/tag/v{version}
        current:
          type: http
          url: https://container-registry.sreyardship.com/api/v2.0/systeminfo
          version-key: /harbor_version
          strip-prerelease: true
          # Harbor 2.13+ only returns 'harbor_version' from /systeminfo to an authenticated
          # caller — see docs/adr/0008. Resolved from the environment via SmallRye expansion;
          # an unset HARBOR_USER/HARBOR_PASS resolves to "" (not absent), which the http
          # current source's factory treats as a value problem (FailedCurrentSource), not a
          # boot failure.
          auth:
            type: basic
            username: ${HARBOR_USER:}
            password: ${HARBOR_PASS:}
        latest:
          type: github-release
          repo: goharbor/harbor
      # --- k8s API server (current-only) example — DO NOT enable under %dev ---
      #
      # This block is intentionally commented out. It documents the shape an operator
      # copies into the PRODUCTION ConfigMap (apps/service-spaces/platformup2date/app/
      # in the jumziCluster repo) — NOT a live dev app. Local dev has no serviceaccount
      # mount, so the ca-cert and token-file below would be absent and every scrape of
      # this app would produce a FailedCurrentSource; keeping it commented protects
      # `gradle quarkusDev` boot and the dev scrape loop. Enable it only in-cluster,
      # where the serviceaccount files are mounted.
      #
      # Reproduces the canonical in-cluster probe:
      #   curl --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
      #        -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
      #        https://kubernetes.default.svc/version
      #
      # - token-file: the serviceaccount token rotates (the kubelet refreshes the file
      #   in place), so the bearer credential is read from the file PER REQUEST rather
      #   than captured once at boot — a long-lived process must never cache it.
      # - ca-cert: the cluster API is served by a PRIVATE cluster CA the JVM does not
      #   trust by default. The custom CA REPLACES (does not augment) the default
      #   truststore and is scoped to THIS scraper only, so it cannot widen trust for
      #   any other current source.
      # - version-key: GET /version returns {"major":"1","minor":"29","gitVersion":"v1.29.x",...};
      #   /gitVersion is the human-readable semver-shaped field.
      #   NOTE: confirm the EXACT pointer against the real cluster API when rolling to
      #   dev — orchestrator to record the verified pointer here after manual dev check.
      #
      # - name: kubernetes
      #   current:
      #     type: http
      #     url: https://kubernetes.default.svc/version
      #     version-key: /gitVersion
      #     ca-cert: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      #     auth:
      #       type: bearer
      #       token-file: /var/run/secrets/kubernetes.io/serviceaccount/token
      #
      # --- Whole-VM monitoring (calver + ssh-os-release + http-regex) — DO NOT enable under %dev ---
      #
      # These two blocks document the shape an operator copies into the PRODUCTION ConfigMap
      # (apps/service-spaces/platformup2date/app/ in the jumziCluster repo) to monitor whole VMs.
      # They are commented out for the same reason as the k8s example above: local dev has no SSH
      # access to the boxes and no mounted key/host-key, so every scrape would yield a
      # FailedCurrentSource and the SSH connect would time out. Enable only where the credentials
      # are provisioned. See docs/adr/0015 (calver), 0016 (ssh-os-release), 0017 (http-regex).
      #
      # Production ConfigMap shape (host-key/key mounts):
      # - private-key-file: mount the monitoring SSH private key as a file (e.g. from a Secret at
      #   /etc/platformup2date/ssh/id_ed25519) and point private-key-file at it. It is read at
      #   CONNECT time, so rotating the Secret is picked up without a redeploy. (Alternatively,
      #   inline private-key: ${SSH_PRIVATE_KEY:} via env expansion — a file mount is preferred.)
      # - host-key: pin the box's public host key inline as a single `ssh-rsa AAAA…`/`ssh-ed25519
      #   AAAA…` line (from `ssh-keyscan <host>`, verified out-of-band). No trust-on-first-use: a
      #   mismatch fails the source. For multiple hosts, mount a known-hosts file instead and use
      #   known-hosts: /etc/platformup2date/ssh/known_hosts (exactly one of host-key/known-hosts).
      # - the monitoring user needs only `cat /etc/os-release`; a restricted/forced-command key is
      #   recommended on the box side.
      #
      # OpenWRT: VERSION_ID looks like 23.05.5 -> calver YY.0M.MICRO; latest from the releases
      # directory listing (HTML), regex pulls the version out of each `href="23.05.5/"`.
      # Changelog link (ADR-0021): calver format-symbol tokens ({YY}, {0M}) resolve to the
      # DISPLAYED substrings of the version string — {0M} stays zero-padded ("05"), not
      # re-rendered as a number ("5").
      # - name: openwrt-router
      #   version-scheme: calver
      #   calver-format: "YY.0M.MICRO"
      #   changelog-url: https://openwrt.org/releases/{YY}.{0M}/notes-{version}
      #   current:
      #     type: ssh-os-release
      #     host: 192.168.1.1
      #     port: 22
      #     user: monitor
      #     private-key-file: /etc/platformup2date/ssh/id_ed25519
      #     host-key: "ssh-ed25519 AAAA…REPLACE_WITH_OPENWRT_HOST_KEY"
      #     # release-field defaults to VERSION_ID
      #   latest:
      #     type: http-regex
      #     url: https://downloads.openwrt.org/releases/
      #     regex: 'href="(\d+\.\d+(?:\.\d+)?)/"'
      #
      # Ubuntu: VERSION_ID looks like 24.04 -> calver YY.0M; latest LTS from the meta-release-lts
      # feed (plain text), regex pulls each `Version: 24.04`. An up-to-date LTS box compares equal
      # to the latest LTS (no drift). This changelog-url is a token-free constant — Ubuntu's
      # release-notes hub always describes the latest release, so no placeholder is needed.
      # - name: ubuntu-vm
      #   version-scheme: calver
      #   calver-format: "YY.0M"
      #   changelog-url: https://documentation.ubuntu.com/release-notes/
      #   current:
      #     type: ssh-os-release
      #     host: 10.0.0.10
      #     port: 22
      #     user: monitor
      #     private-key-file: /etc/platformup2date/ssh/id_ed25519
      #     host-key: "ssh-ed25519 AAAA…REPLACE_WITH_UBUNTU_HOST_KEY"
      #   latest:
      #     type: http-regex
      #     url: https://changelogs.ubuntu.com/meta-release-lts
      #     regex: 'Version: (\d+\.\d+)'
