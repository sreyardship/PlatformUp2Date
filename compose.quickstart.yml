# No-toolchain quick start: pulls the published GHCR images
#
# Usage:
#   docker compose -f compose.quickstart.yml up
#   -> http://localhost:3000
#
# see docs/configuration.md for the full config
# reference and docs/deployment.md for a real cluster rollout.
#
services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped

  backend:
    image: ghcr.io/sreyardship/platformup2date/backend:0.0.48
    restart: unless-stopped
    environment:
      QUARKUS_REDIS_HOSTS: redis://valkey:6379
      QUARKUS_CONFIG_LOCATIONS: /config/platform-config.yaml
      # Optional: set a GitHub token to raise the github-release leg's rate
      # limit from 60 to 5,000 req/hr.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./deploy/k8s/base/platform-config.yaml:/config/platform-config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      - valkey

  frontend:
    image: ghcr.io/sreyardship/platformup2date/frontend:0.0.46
    restart: unless-stopped
    environment:
      # Empty = same-origin
      API_BASE_URL: ""
    volumes:
      - ./frontend/nginx.quickstart.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
