server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Resolve the backend at request time via Docker's embedded DNS
        # (127.0.0.11) rather than at startup. Using a variable in proxy_pass
        # forces lazy resolution, so nginx won't abort with "host not found in
        # upstream" if the backend container isn't DNS-ready yet on first boot
        # (depends_on only waits for start, not readiness).
        resolver 127.0.0.11 valid=10s;
        set $upstream_backend backend:8080;
        proxy_pass http://$upstream_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}
