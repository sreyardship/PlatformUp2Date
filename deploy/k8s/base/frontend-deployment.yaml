apiVersion: apps/v1
kind: Deployment
metadata:
  name: platformup2date-frontend
  labels:
    app.kubernetes.io/name: platformup2date
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platformup2date
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platformup2date
        app.kubernetes.io/component: frontend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: platformup2date
              app.kubernetes.io/component: frontend
      containers:
        - name: frontend
          image: ghcr.io/sreyardship/platformup2date/frontend
          ports:
            - name: http
              containerPort: 80
          env:
            # Injected into window._env_ at container start. Empty means
            # same-origin: the browser calls /api on whatever host served the
            # page, and the ingress routes /api to the backend (unstripped).
            - name: API_BASE_URL
              value: ""
            # Web UI authentication (docs/adr/0028) — also injected into
            # window._env_ at container start, OFF by default. Empty
            # OIDC_AUTHORITY/OIDC_CLIENT_ID renders the SPA exactly as today:
            # no login, no bearer token attached to /api/v1 calls. To turn it
            # on, set both to your IdP's issuer URL and the SPA's public
            # (PKCE, no secret) client ID; the backend's matching
            # OIDC_ISSUER/OIDC_AUDIENCE/WEB_OIDC_ROLE live in the
            # platformup2date-env Secret (see backend-deployment.yaml).
            - name: OIDC_AUTHORITY
              value: ""
            - name: OIDC_CLIENT_ID
              value: ""
            # Optional; the frontend defaults this to "openid profile" itself
            # when unset, so leaving it empty here is equivalent to omitting it.
            - name: OIDC_SCOPE
              value: ""
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
